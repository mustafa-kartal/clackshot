<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: ws: http://localhost:* http://127.0.0.1:*; img-src 'self' data:;" />
    <title>ClackShot</title>
    <link rel="icon" type="image/png" href="../../resources/icons/favicon-dark.png" />
    <link rel="stylesheet" href="../editor/styles/globals.css" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      /* Pencerenin kendisi sürüklenemez yapsa da, splash boyunca tıklamayı
         emelim — odak çalmasın. */
      body {
        -webkit-app-region: drag;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
