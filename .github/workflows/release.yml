name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            eb_args: --mac --arm64
          - name: macOS x64
            os: macos-latest
            eb_args: --mac --x64
          - name: Windows x64
            os: windows-latest
            eb_args: --win --x64
          - name: Linux x64
            os: ubuntu-latest
            eb_args: --linux --x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm libvips-dev

      - name: Install dependencies
        run: npm ci

      - name: Install sharp for target platform (Windows)
        if: matrix.os == 'windows-latest'
        run: npm install --cpu=x64 --os=win32 sharp

      - name: Build preload & renderer
        run: npm run build:preload && npx vite build

      - name: Build
        run: npx electron-builder ${{ matrix.eb_args }}

      - name: Upload artifacts to release
        shell: bash
        run: |
          files=$(find build -maxdepth 1 -type f \( \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" \
          \))
          echo "Uploading: $files"
          gh release upload "${{ github.ref_name }}" $files --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
